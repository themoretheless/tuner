name: Build Desktop

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: 'deb appimage'
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: 'dmg app'
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: 'dmg app'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: 'nsis'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Build Tauri
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/**/bundle/**/*
          retention-days: 7
          if-no-files-found: warn

  build-egui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install egui deps
        working-directory: egui
        run: cargo fetch

      - name: Build egui
        working-directory: egui
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare egui binary
        run: |
          mkdir -p release-artifacts
          BINARY="guitar-tuner-egui"
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXT=".exe"
          fi
          cp "egui/target/${{ matrix.target }}/release/${BINARY}${EXT}" "release-artifacts/guitar-tuner-egui-${{ matrix.os }}-${{ matrix.target }}${EXT}"

      - name: Upload egui artifacts
        uses: actions/upload-artifact@v4
        with:
          name: egui-${{ matrix.os }}-${{ matrix.target }}
          path: release-artifacts/
          retention-days: 7
          if-no-files-found: warn
