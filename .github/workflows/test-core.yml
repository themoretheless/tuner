name: Test pitch-core

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # pitch-core depends only on rustfft (no cpal/ALSA), so -p keeps the
      # workspace's native-audio members out of the build.
      - name: Test pitch-core
        run: cargo test -p pitch-core
        env:
          CARGO_INCREMENTAL: 0
