name: Release
run-name: "Release: ${{ github.event.head_commit.message || github.ref_name }}"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create as pre-release"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml

  build-desktop:
    needs: build
    uses: ./.github/workflows/build-desktop.yml
    # Builds both Tauri and egui versions.
    # Failures in one don't block the other or pages (if: always in release)

  pages-deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs: [build, build-desktop]
    if: always()  # run even if desktop fails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p 'require("./version.json").version')
          IS_PRE=${{ inputs.prerelease || 'false' }}
          if [ "$IS_PRE" = "true" ]; then
            TAG="v${VERSION}-rc.$(date +%Y%m%d%H%M%S)"
          else
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_pre=$IS_PRE" >> $GITHUB_OUTPUT

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version v${VERSION} already released, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download web artifact
        if: steps.version.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: _site

      - name: Package web for release
        if: steps.version.outputs.skip != 'true'
        run: tar -cf artifact.tar -C _site .

      - name: Download Tauri artifacts
        if: steps.version.outputs.skip != 'true' && needs.build-desktop.result == 'success'
        uses: actions/download-artifact@v8
        with:
          path: tauri-artifacts
          merge-multiple: true

      - name: Download egui artifacts
        if: steps.version.outputs.skip != 'true' && needs.build-desktop.result == 'success'
        uses: actions/download-artifact@v8
        with:
          path: egui-artifacts
          merge-multiple: true

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.is_pre == 'true' }}
          generate_release_notes: true
          files: |
            artifact.tar
            tauri-artifacts/**/*
            egui-artifacts/**/*
